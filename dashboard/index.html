<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcapasos IoT v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.8/dist/mqtt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            text-align: center;
        }
        .status-item {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00d4ff;
        }
        .status-label { 
            font-size: 12px; 
            color: #00d4ff; 
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .status-value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 20px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }
        button:hover { 
            background: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        button.off { 
            border-color: #ff3333;
            color: #ff3333;
            background: rgba(255, 51, 51, 0.2);
        }
        button.off:hover { 
            background: rgba(255, 51, 51, 0.4);
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
        }
        input[type="number"] {
            padding: 10px;
            border: 2px solid #00d4ff;
            border-radius: 8px;
            width: 80px;
            font-size: 16px;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }
        .chart-container {
            position: relative;
            height: 350px;
            grid-column: 1 / -1;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
        }
        .mqtt-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff3333;
            margin-right: 8px;
            animation: none;
        }
        .mqtt-status.connected {
            background: #00ff88;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(0, 255, 136, 0); }
        }
        .info {
            grid-column: 1 / -1;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 15px;
            border-radius: 10px;
            color: #00d4ff;
            font-size: 14px;
        }
        .mqtt-label {
            color: #00d4ff;
            font-weight: bold;
        }
        .debug-box {
            grid-column: 1 / -1;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #00ff88;
            font-family: monospace;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❤️ Monitor Marcapasos IoT - ECG</h1>
        
        <div class="grid">
            <!-- Panel Estado -->
            <div class="card">
                <h2>Estado del Sistema</h2>
                <div style="margin-bottom: 15px;">
                    <span class="mqtt-status" id="mqttStatus"></span>
                    <span class="mqtt-label" id="mqttText">Desconectado</span>
                </div>
                <div class="status-panel">
                    <div class="status-item">
                        <div class="status-label">Estado</div>
                        <div class="status-value" id="estado">OFF</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">BPM</div>
                        <div class="status-value" id="bpmValue">60</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">ECG</div>
                        <div class="status-value" id="ecgValue">0</div>
                    </div>
                </div>
            </div>

            <!-- Panel Control -->
            <div class="card">
                <h2>Control</h2>
                <div class="controls">
                    <button id="btnOn">▶ ENCENDER</button>
                    <button class="off" id="btnOff">⏹ APAGAR</button>
                </div>
                <div class="input-group">
                    <label>BPM:</label>
                    <input type="number" id="bpmInput" min="30" max="180" value="60">
                    <button id="btnSetBPM">Aplicar</button>
                </div>
            </div>

            <!-- Gráfica ECG -->
            <div class="card chart-container">
                <canvas id="ecgChart"></canvas>
            </div>

            <!-- Debug Info -->
            <div class="debug-box" id="debugBox">
Esperando conexión MQTT...
            </div>

            <!-- Info -->
            <div class="info">
                💡 <strong>Broker:</strong> broker.hivemq.com | 
                <strong>Muestreo:</strong> 250 Hz | 
                <strong>Batch:</strong> 50 muestras c/200ms
            </div>
        </div>
    </div>

    <script>
        // ===== CHART.JS =====
        const ctx = document.getElementById('ecgChart').getContext('2d');
        const ecgChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'ECG (250Hz)',
                    data: [],
                    borderColor: '#00ff88',
                    backgroundColor: 'rgba(0, 255, 136, 0.1)',
                    tension: 0.1,
                    fill: true,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                scales: {
                    y: { 
                        min: 1000,
                        max: 3200,
                        ticks: { color: '#00d4ff' },
                        grid: { color: 'rgba(0, 212, 255, 0.1)' }
                    },
                    x: { display: false }
                },
                plugins: { 
                    legend: { labels: { color: '#00d4ff' } }
                }
            }
        });

        let ecgData = [];
        const maxPoints = 250;
        let batchCount = 0;

        // ===== MQTT =====
        console.log('Conectando a MQTT...');
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
            clientId: 'web_v2_' + Math.random(),
            reconnectPeriod: 3000,
            keepalive: 30
        });

        client.on('connect', function() {
            console.log('✓ MQTT Conectado');
            document.getElementById('mqttStatus').classList.add('connected');
            document.getElementById('mqttText').textContent = 'Conectado';
            client.subscribe('pacemaker/ecg');
            client.subscribe('pacemaker/state');
            addDebug('✓ MQTT Conectado al broker');
        });

        client.on('disconnect', function() {
            document.getElementById('mqttStatus').classList.remove('connected');
            document.getElementById('mqttText').textContent = 'Desconectado';
            addDebug('✗ Desconectado de MQTT');
        });

        client.on('error', function(err) {
            console.error('Error MQTT:', err);
            addDebug('✗ Error MQTT: ' + err);
        });

        client.on('message', function(topic, message) {
            const payload = message.toString();

            if (topic === 'pacemaker/ecg') {
                try {
                    const parts = payload.split(',');
                    if (parts.length > 1) {
                        const values = parts.slice(1).map(v => parseInt(v));
                        
                        values.forEach(val => {
                            ecgData.push(val);
                            if (ecgData.length > maxPoints) ecgData.shift();
                        });
                        
                        ecgChart.data.labels = Array(ecgData.length).fill('');
                        ecgChart.data.datasets[0].data = ecgData;
                        ecgChart.update('none');
                        
                        document.getElementById('ecgValue').textContent = values[values.length - 1];
                        
                        batchCount++;
                        if (batchCount % 5 === 0) {
                            addDebug(`Batch #${batchCount}: ${values.length} muestras`);
                        }
                    }
                } catch(e) {
                    console.error('Error parseando:', e);
                }
            } 
            else if (topic === 'pacemaker/state') {
                const state = payload;
                document.getElementById('mqttText').textContent = state;
                addDebug('Estado: ' + state);
                
                // LIMPIAR GRÁFICA SI ESTÁ INACTIVO
                if (state === 'INACTIVO') {
                    ecgData = [];
                    ecgChart.data.labels = [];
                    ecgChart.data.datasets[0].data = [];
                    ecgChart.update('none');
                    document.getElementById('ecgValue').textContent = '0';
                    addDebug('Gráfica limpiada (INACTIVO)');
                }
            }
        });

        // ===== DEBUG BOX =====
        function addDebug(msg) {
            const box = document.getElementById('debugBox');
            const timestamp = new Date().toLocaleTimeString();
            box.textContent = `[${timestamp}] ${msg}\n` + box.textContent.split('\n').slice(0, 4).join('\n');
        }

        // ===== BOTONES =====
        document.getElementById('btnOn').addEventListener('click', function() {
            client.publish('pacemaker/cmd', 'ON');
            document.getElementById('estado').textContent = 'ON';
        });

        document.getElementById('btnOff').addEventListener('click', function() {
            client.publish('pacemaker/cmd', 'OFF');
            document.getElementById('estado').textContent = 'OFF';
        });

        document.getElementById('btnSetBPM').addEventListener('click', function() {
            const bpm = document.getElementById('bpmInput').value;
            client.publish('pacemaker/cmd', 'BPM:' + bpm);
            document.getElementById('bpmValue').textContent = bpm;
        });
    </script>
</body>
</html>
